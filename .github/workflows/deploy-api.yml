name: Deploy API

# Image-only deploy for the production API Container App.
#
# Why image-only:
#   The previous implementation used azure/container-apps-deploy-action@v1,
#   which under the hood invokes `az containerapp up`. That command can reset
#   or omit runtime environment variables on the Container App, producing
#   confusing revisions and clobbering settings owned by the
#   Configure API Runtime workflow.
#
#   This workflow now does two narrow things:
#     1. Build and push the API image to ACR via `docker login` + `docker
#        build` + `docker push`, using the REGISTRY_USERNAME /
#        REGISTRY_PASSWORD secrets that the prior working deploy used.
#        We avoid `az acr build` here because it relies on ACR Tasks
#        (`scheduleRun`/`Microsoft.ContainerRegistry/registries/scheduleRun/action`),
#        which the GitHub OIDC federated principal does not currently hold.
#        Docker push only requires the existing registry username/password
#        scope, so the build succeeds without granting additional ACR Tasks
#        RBAC to the OIDC identity.
#     2. Update ONLY the container image on the existing Container App via
#        `az containerapp update --image` (still authenticated via Azure
#        OIDC login). This creates a new revision that inherits the
#        existing runtime env vars rather than replacing them.
#
#   Runtime environment variables (DATABASE_URL, Microsoft Entra config,
#   ALLOWED_* allow-lists, etc.) are owned exclusively by
#   .github/workflows/configure-api-runtime.yml and must not be set here.

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - ".github/workflows/deploy-api.yml"

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-api
  cancel-in-progress: true

env:
  RESOURCE_GROUP: dyc-comm-prod-rg
  CONTAINER_APP_NAME: dyc-comm-prod-api
  REGISTRY_URL: dyccommprodacr-fmf6dchxeca3bsbf.azurecr.io
  REGISTRY_NAME: dyccommprodacr-fmf6dchxeca3bsbf
  IMAGE_REPOSITORY: dyc-comm-api
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR with registry credentials
        # Use the known-working REGISTRY_USERNAME / REGISTRY_PASSWORD
        # secrets rather than the OIDC-authenticated `az acr login`. This
        # sidesteps the ACR Tasks `scheduleRun` RBAC requirement that
        # `az acr build` needs and that the federated identity does not
        # currently have.
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push API image
        # Plain docker build/push against ACR. Only AcrPush-equivalent
        # scope is required, which the registry username/password already
        # provides. No ACR Tasks permissions needed.
        run: |
          set -euo pipefail
          FULL_IMAGE="${REGISTRY_URL}/${IMAGE_REPOSITORY}:${IMAGE_TAG}"
          docker build \
            -f apps/api/Dockerfile \
            -t "${FULL_IMAGE}" \
            apps/api
          docker push "${FULL_IMAGE}"

      - name: Update Container App image only (preserves runtime env)
        # IMPORTANT: only `--image` is set here. Runtime environment
        # variables on the Container App are owned by the
        # Configure API Runtime workflow and must not be touched from
        # this deploy. `az containerapp update --image` creates a new
        # revision that inherits the existing env var set.
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            set -euo pipefail
            FULL_IMAGE="${{ env.REGISTRY_URL }}/${{ env.IMAGE_REPOSITORY }}:${{ env.IMAGE_TAG }}"
            echo "Deploying image: ${FULL_IMAGE}"
            az containerapp update \
              --name "${{ env.CONTAINER_APP_NAME }}" \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --image "${FULL_IMAGE}" \
              --output none
            echo "Container App image updated; runtime env vars left untouched."
