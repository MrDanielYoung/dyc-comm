name: Trigger auto deployment for dyc-comm-prod-web

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/dyc-comm-prod-web-AutoDeployTrigger-76cbc8cb-1cdc-48c9-a80a-7470f13417c4.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.DYCCOMMPRODWEB_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.DYCCOMMPRODWEB_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.DYCCOMMPRODWEB_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: 
          registryUsername: ${{ secrets.DYCCOMMPRODWEB_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.DYCCOMMPRODWEB_REGISTRY_PASSWORD }}
          containerAppName: dyc-comm-prod-web
          resourceGroup: dyc-comm-prod-rg
          imageToBuild: default/[parameters('containerAppName')]:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


