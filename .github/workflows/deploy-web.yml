name: Deploy Web

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/web/**"
      - ".github/workflows/deploy-web.yml"

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-web
  cancel-in-progress: true

env:
  RESOURCE_GROUP: dyc-comm-prod-rg
  CONTAINER_APP_NAME: dyc-comm-prod-web
  REGISTRY_URL: dyccommprodacr-fmf6dchxeca3bsbf.azurecr.io
  IMAGE_NAME: dyccommprodacr-fmf6dchxeca3bsbf.azurecr.io/dyc-comm-web:${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and deploy web container app
        uses: azure/container-apps-deploy-action@v1
        with:
          appSourcePath: ${{ github.workspace }}/apps/web
          dockerfilePath: Dockerfile
          registryUrl: ${{ env.REGISTRY_URL }}
          registryUsername: ${{ secrets.REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.REGISTRY_PASSWORD }}
          imageToBuild: ${{ env.IMAGE_NAME }}
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: ${{ env.CONTAINER_APP_NAME }}
          disableTelemetry: true
