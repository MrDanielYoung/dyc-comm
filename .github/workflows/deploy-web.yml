name: Deploy Web

# Image-only deploy for the production web Container App.
#
# Why image-only (mirrors deploy-api.yml):
#   The previous implementation used azure/container-apps-deploy-action@v1,
#   which wraps `az containerapp up`. That command was observed to report
#   success without the running revision actually picking up a freshly built
#   image, so the live site at https://comm.danielyoung.io stayed pinned to
#   an older shell while subsequent main-branch commits (PRs #41, #43, #44)
#   reported green deploys.
#
#   This workflow now does four narrow things:
#     1. Build and push the web image to ACR via `docker login` + `docker
#        build` + `docker push`. The registry username/password secrets
#        already grant AcrPush, so no extra ACR Tasks RBAC is needed.
#     2. Update ONLY the container image on the existing Container App via
#        `az containerapp update --image`. Like the API, this creates a new
#        revision while leaving any other Container App config alone.
#     3. Wait for the new revision to actually become Active+Running and
#        be the 100% traffic target before any content checks run.
#        `az containerapp update --image` returns before that flip
#        happens, so without this step verification races the rollout and
#        flaps against whichever revision the FQDN happens to serve.
#     4. After the rollout is confirmed, fetch the Container App FQDN and
#        the public custom domain and assert the served HTML contains the
#        current Microsoft sign-in CTA and does NOT contain the removed
#        "Private app" subtitle. If either check fails the deploy is
#        marked failed so we don't keep shipping green-but-stale runs.

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/web/**"
      - ".github/workflows/deploy-web.yml"

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-web
  cancel-in-progress: true

env:
  RESOURCE_GROUP: dyc-comm-prod-rg
  CONTAINER_APP_NAME: dyc-comm-prod-web
  REGISTRY_URL: dyccommprodacr-fmf6dchxeca3bsbf.azurecr.io
  IMAGE_REPOSITORY: dyc-comm-web
  IMAGE_TAG: ${{ github.sha }}
  PUBLIC_WEB_URL: https://comm.danielyoung.io

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify source HTML contains expected shell strings
        # Build-time guard against accidentally shipping an index.html that
        # has been gutted of its login or post-login UI. The unauthenticated
        # HTTP response can only assert the login shell (the dashboard
        # markup is hidden behind auth state in the SPA), so this step
        # covers the post-login strings by grepping the static source that
        # will be baked into the image. If these ever move into JS-rendered
        # templates, update or relax this list — but failing here is
        # cheaper than discovering a regression after deploy.
        run: |
          set -euo pipefail
          SOURCE=apps/web/index.html
          if [ ! -f "${SOURCE}" ]; then
            echo "Expected ${SOURCE} to exist" >&2
            exit 1
          fi
          REQUIRED_SOURCE_STRINGS=(
            'Sign in with Microsoft'
            'Inbox Sorting'
          )
          FORBIDDEN_SOURCE_STRINGS=(
            'Private app'
          )
          rc=0
          for needle in "${REQUIRED_SOURCE_STRINGS[@]}"; do
            if ! grep -qF "${needle}" "${SOURCE}"; then
              echo "FAIL: ${SOURCE} missing required string: ${needle}" >&2
              rc=1
            else
              echo "OK: ${SOURCE} contains: ${needle}"
            fi
          done
          for needle in "${FORBIDDEN_SOURCE_STRINGS[@]}"; do
            if grep -qF "${needle}" "${SOURCE}"; then
              echo "FAIL: ${SOURCE} still contains stale string: ${needle}" >&2
              rc=1
            else
              echo "OK: ${SOURCE} does not contain stale string: ${needle}"
            fi
          done
          exit $rc

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR with registry credentials
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push web image
        run: |
          set -euo pipefail
          FULL_IMAGE="${REGISTRY_URL}/${IMAGE_REPOSITORY}:${IMAGE_TAG}"
          docker build \
            -f apps/web/Dockerfile \
            -t "${FULL_IMAGE}" \
            apps/web
          docker push "${FULL_IMAGE}"

      - name: Update Container App image and capture new revision
        id: deploy
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            set -euo pipefail
            FULL_IMAGE="${{ env.REGISTRY_URL }}/${{ env.IMAGE_REPOSITORY }}:${{ env.IMAGE_TAG }}"
            echo "Deploying image: ${FULL_IMAGE}"
            az containerapp update \
              --name "${{ env.CONTAINER_APP_NAME }}" \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --image "${FULL_IMAGE}" \
              --output none
            NEW_REVISION=$(az containerapp show \
              --name "${{ env.CONTAINER_APP_NAME }}" \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --query "properties.latestRevisionName" \
              -o tsv)
            FQDN=$(az containerapp show \
              --name "${{ env.CONTAINER_APP_NAME }}" \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --query "properties.configuration.ingress.fqdn" \
              -o tsv)
            if [ -z "${NEW_REVISION}" ] || [ -z "${FQDN}" ]; then
              echo "Failed to resolve revision/FQDN (revision='${NEW_REVISION}', fqdn='${FQDN}')" >&2
              exit 1
            fi
            echo "New revision: ${NEW_REVISION}"
            echo "Container App FQDN: ${FQDN}"
            echo "revision=${NEW_REVISION}" >> "$GITHUB_OUTPUT"
            echo "fqdn=${FQDN}" >> "$GITHUB_OUTPUT"

      - name: Wait for new revision to be Running with full traffic
        # Container App `update` returns before the new revision is the
        # active traffic target, which is why prior runs hit the verify
        # step while the FQDN was still serving the old revision. Poll
        # until our newly-created revision is provisioned, healthy, and
        # holds 100% of the traffic weight before content checks run.
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            set -euo pipefail
            REVISION="${{ steps.deploy.outputs.revision }}"
            DEADLINE=$(( $(date +%s) + 360 ))
            while : ; do
              REV_STATE=$(az containerapp revision show \
                --name "${{ env.CONTAINER_APP_NAME }}" \
                --resource-group "${{ env.RESOURCE_GROUP }}" \
                --revision "${REVISION}" \
                --query "{prov:properties.provisioningState,run:properties.runningState,active:properties.active}" \
                -o json 2>/dev/null || echo '{}')
              TRAFFIC=$(az containerapp show \
                --name "${{ env.CONTAINER_APP_NAME }}" \
                --resource-group "${{ env.RESOURCE_GROUP }}" \
                --query "properties.configuration.ingress.traffic" \
                -o json 2>/dev/null || echo '[]')
              echo "Revision state: ${REV_STATE}"
              echo "Traffic split: ${TRAFFIC}"
              PROV=$(printf '%s' "${REV_STATE}" | python3 -c "import sys,json;d=json.load(sys.stdin);print(d.get('prov') or '')")
              RUN=$(printf '%s' "${REV_STATE}" | python3 -c "import sys,json;d=json.load(sys.stdin);print(d.get('run') or '')")
              ACTIVE=$(printf '%s' "${REV_STATE}" | python3 -c "import sys,json;d=json.load(sys.stdin);print(d.get('active'))")
              # Traffic split is a list. Container App may either pin a
              # specific revision name (revisionName==our REVISION) or use
              # latestRevision==True; either case means our revision is
              # the active traffic target at 100%.
              WEIGHT=$(printf '%s' "${TRAFFIC}" | REV="${REVISION}" python3 -c 'import os,sys,json; rev=os.environ["REV"]; data=json.load(sys.stdin) or []; m=[(i.get("weight") or 0) for i in data if i.get("latestRevision") or i.get("revisionName")==rev]; print(m[0] if m else 0)')
              # Azure reports several healthy "Running*" runningState values
              # (Running, RunningAtMaxScale, etc.) depending on scale-rule
              # state. They all mean the revision is up and serving — only
              # the explicit failure states should fail the wait.
              case "${RUN}" in
                Running*) RUN_OK=1 ;;
                *) RUN_OK=0 ;;
              esac
              if [ "${PROV}" = "Provisioned" ] && [ "${RUN_OK}" = "1" ] && [ "${ACTIVE}" = "True" ] && [ "${WEIGHT}" = "100" ]; then
                echo "Revision ${REVISION} is active with 100% traffic (runningState=${RUN})."
                break
              fi
              if [ "${PROV}" = "Failed" ] || [ "${RUN}" = "Failed" ] || [ "${RUN}" = "Degraded" ]; then
                echo "Revision ${REVISION} entered a failed state." >&2
                az containerapp revision show \
                  --name "${{ env.CONTAINER_APP_NAME }}" \
                  --resource-group "${{ env.RESOURCE_GROUP }}" \
                  --revision "${REVISION}" \
                  -o json >&2 || true
                exit 1
              fi
              if [ "$(date +%s)" -ge "${DEADLINE}" ]; then
                echo "Timed out waiting for revision ${REVISION} to become active." >&2
                az containerapp revision show \
                  --name "${{ env.CONTAINER_APP_NAME }}" \
                  --resource-group "${{ env.RESOURCE_GROUP }}" \
                  --revision "${REVISION}" \
                  -o json >&2 || true
                exit 1
              fi
              sleep 10
            done

      - name: Verify deployed web content
        # The new revision is now the active traffic target, so we can do
        # strict content checks against the unauthenticated login shell.
        # We only require strings that are genuinely present in the HTML
        # served to a logged-out client (the Microsoft sign-in CTA) and a
        # negative check that the removed "Private app" subtitle is gone.
        # Post-login markup like "Inbox Sorting" lives in the same static
        # index.html but is gated by JS auth state, so we don't require
        # those here — the build-time grep above covers source regressions
        # without producing false negatives over HTTP. Always dump a body
        # snippet on failure so we can see exactly what was served.
        env:
          FQDN: ${{ steps.deploy.outputs.fqdn }}
        run: |
          set -uo pipefail

          STALE_STRING='Private app'
          REQUIRED_STRINGS=(
            'Sign in with Microsoft'
          )

          check_url() {
            local url="$1"
            local label="$2"
            local extra_header="${3:-}"
            echo "::group::Validating ${label} (${url})"
            local body_file
            body_file=$(mktemp)
            local headers_file
            headers_file=$(mktemp)
            local http_code=""
            local attempt
            for attempt in 1 2 3 4 5 6; do
              : > "${body_file}"
              : > "${headers_file}"
              local curl_args=(-sSL --max-time 25 -D "${headers_file}" -o "${body_file}" -w '%{http_code}')
              if [ -n "${extra_header}" ]; then
                curl_args+=(-H "${extra_header}")
              fi
              http_code=$(curl "${curl_args[@]}" "${url}" 2>/dev/null || echo "000")
              local size
              size=$(wc -c < "${body_file}" | tr -d ' ')
              echo "Attempt ${attempt}: HTTP ${http_code}, ${size} bytes"
              if [ "${http_code}" = "200" ] && [ "${size}" -gt 0 ]; then
                break
              fi
              echo "Fetch attempt ${attempt} not OK; retrying in 10s..."
              sleep 10
            done

            local size
            size=$(wc -c < "${body_file}" | tr -d ' ')
            local rc=0
            if [ "${http_code}" != "200" ] || [ "${size}" -eq 0 ]; then
              echo "FAIL: could not fetch ${label} (last HTTP=${http_code}, size=${size})" >&2
              rc=1
            else
              echo "Fetched ${size} bytes from ${label} (HTTP ${http_code})."

              if grep -qF "${STALE_STRING}" "${body_file}"; then
                echo "FAIL: ${label} still contains stale string '${STALE_STRING}'" >&2
                rc=1
              else
                echo "OK: ${label} does not contain stale string."
              fi
              local needle
              for needle in "${REQUIRED_STRINGS[@]}"; do
                # Case-insensitive on the off chance an upstream layer
                # rewrites casing; the underlying HTML is the source of
                # truth and we still want to fail on missing content.
                if ! grep -qiF "${needle}" "${body_file}"; then
                  echo "FAIL: ${label} missing required string: ${needle}" >&2
                  rc=1
                else
                  echo "OK: ${label} contains: ${needle}"
                fi
              done
            fi

            # Always dump headers + a body snippet to make failures easy
            # to diagnose without re-running the workflow with extra
            # logging.
            if [ "${rc}" -ne 0 ]; then
              echo "--- response headers for ${label} ---" >&2
              head -c 2000 "${headers_file}" >&2 || true
              echo >&2
              echo "--- first 2000 chars of ${label} body ---" >&2
              head -c 2000 "${body_file}" >&2 || true
              echo >&2
              echo "--- end ${label} response excerpt ---" >&2
            fi
            rm -f "${body_file}" "${headers_file}"
            echo "::endgroup::"
            return $rc
          }

          overall=0

          # The Container App FQDN check is authoritative: it bypasses any
          # custom-domain caching layer and goes straight to the active
          # revision we just verified above.
          if ! check_url "https://${FQDN}" "Container App FQDN"; then
            overall=1
          fi

          # The public custom domain points at the same Container App, but
          # add a cache-busting query string and Cache-Control header to
          # defeat any intermediate caches. Still required to pass — if
          # the custom domain is stale here, end users see stale content.
          if ! check_url "${PUBLIC_WEB_URL}/?deploy=${IMAGE_TAG}" "Public custom domain" "Cache-Control: no-cache"; then
            overall=1
          fi

          exit $overall
