name: Configure API Runtime

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  RESOURCE_GROUP: dyc-comm-prod-rg
  CONTAINER_APP_NAME: dyc-comm-prod-api

jobs:
  configure-runtime:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Apply API runtime settings
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name "$CONTAINER_APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --set-env-vars \
                APP_ENV=production \
                DATABASE_URL="${{ secrets.DATABASE_URL }}" \
                MICROSOFT_ENTRA_CLIENT_ID="${{ secrets.MICROSOFT_ENTRA_CLIENT_ID }}" \
                MICROSOFT_ENTRA_TENANT_ID="${{ secrets.MICROSOFT_ENTRA_TENANT_ID }}" \
                MICROSOFT_ENTRA_CLIENT_SECRET="${{ secrets.MICROSOFT_ENTRA_CLIENT_SECRET }}" \
                MICROSOFT_ENTRA_REDIRECT_URI="https://api.comm.danielyoung.io/auth/microsoft/callback" \
                WEB_APP_URL="https://comm.danielyoung.io" \
                API_BASE_URL="https://api.comm.danielyoung.io" \
                ALLOWED_ORIGINS="https://comm.danielyoung.io" \
                KEY_VAULT_REFS_ENABLED=true
