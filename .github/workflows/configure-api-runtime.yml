name: Configure API Runtime

# Manual-only workflow that pushes the documented runtime env vars onto the
# production API Container App. Secret values are sourced from Azure Key
# Vault (dyc-comm-prod-kv) at workflow run time, never from GitHub secrets,
# and are masked so they are not echoed in logs.
#
# See docs/azure-runtime-config.md for the contract this workflow honors.

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: configure-api-runtime
  cancel-in-progress: false

env:
  RESOURCE_GROUP: dyc-comm-prod-rg
  CONTAINER_APP_NAME: dyc-comm-prod-api
  KEY_VAULT_NAME: dyc-comm-prod-kv
  MICROSOFT_ENTRA_REDIRECT_URI: https://api.comm.danielyoung.io/auth/microsoft/callback
  WEB_APP_URL: https://comm.danielyoung.io
  API_BASE_URL: https://api.comm.danielyoung.io
  ALLOWED_ORIGINS: https://comm.danielyoung.io
  # OAuth callback tenant allow-list seed. The Decoding Options tenant id
  # is non-secret and committed here so the production identity policy is
  # reviewable in code. The DHW and BW tenant ids are sourced from Key
  # Vault at apply time (secrets `dhw-tid` and `bw-tid`) and concatenated
  # onto this seed below — keeping partner tenant ids out of the repo.
  ALLOWED_MICROSOFT_TENANT_IDS_SEED: 99c0f350-71bd-47f9-ab6a-cf10bc76533a

jobs:
  configure-runtime:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch Key Vault secrets and apply API runtime settings
        # azure/cli@v2 runs the inlineScript inside a Docker container and
        # does not forward arbitrary workflow `env:` vars into it. Values
        # the script needs (resource group, app name, vault name, well-known
        # URLs, tenant id seed) are interpolated via `${{ env.X }}` at the
        # GitHub Actions level. Secret values fetched from Key Vault remain
        # in shell variables inside the container.
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            set -euo pipefail

            KEY_VAULT_NAME="${{ env.KEY_VAULT_NAME }}"
            CONTAINER_APP_NAME="${{ env.CONTAINER_APP_NAME }}"
            RESOURCE_GROUP="${{ env.RESOURCE_GROUP }}"
            MICROSOFT_ENTRA_REDIRECT_URI="${{ env.MICROSOFT_ENTRA_REDIRECT_URI }}"
            WEB_APP_URL="${{ env.WEB_APP_URL }}"
            API_BASE_URL="${{ env.API_BASE_URL }}"
            ALLOWED_ORIGINS="${{ env.ALLOWED_ORIGINS }}"
            ALLOWED_MICROSOFT_TENANT_IDS_SEED="${{ env.ALLOWED_MICROSOFT_TENANT_IDS_SEED }}"

            echo "Target Container App: ${CONTAINER_APP_NAME} in ${RESOURCE_GROUP}"
            echo "Key Vault: ${KEY_VAULT_NAME}"

            fetch_secret() {
              local kv_name="$1"
              local value
              value="$(az keyvault secret show \
                --vault-name "$KEY_VAULT_NAME" \
                --name "$kv_name" \
                --query value \
                --output tsv)"
              if [[ -z "${value}" ]]; then
                echo "::error::Key Vault secret '${kv_name}' in vault '${KEY_VAULT_NAME}' is empty or missing." >&2
                exit 1
              fi
              # Mask the value so it cannot be echoed in subsequent log lines.
              echo "::add-mask::${value}"
              printf '%s' "${value}"
            }

            echo "Fetching secret: PGdb-URL"
            DATABASE_URL="$(fetch_secret PGdb-URL)"
            echo "Fetching secret: microsoft-entra-client-id"
            MICROSOFT_ENTRA_CLIENT_ID="$(fetch_secret microsoft-entra-client-id)"
            echo "Fetching secret: microsoft-entra-tenant-id"
            MICROSOFT_ENTRA_TENANT_ID="$(fetch_secret microsoft-entra-tenant-id)"
            echo "Fetching secret: dyc-comm-prod-value"
            MICROSOFT_ENTRA_CLIENT_SECRET="$(fetch_secret dyc-comm-prod-value)"
            echo "Fetching secret: dhw-tid"
            DHW_TID="$(fetch_secret dhw-tid)"
            echo "Fetching secret: bw-tid"
            BW_TID="$(fetch_secret bw-tid)"
            echo "Fetching secret: allowed-account-emails"
            ALLOWED_ACCOUNT_EMAILS="$(fetch_secret allowed-account-emails)"

            # Build the tenant allow-list from the committed Decoding Options
            # seed plus the DHW and BW tenant ids fetched from Key Vault.
            ALLOWED_MICROSOFT_TENANT_IDS="${ALLOWED_MICROSOFT_TENANT_IDS_SEED},${DHW_TID},${BW_TID}"

            for var in \
              DATABASE_URL \
              MICROSOFT_ENTRA_CLIENT_ID \
              MICROSOFT_ENTRA_TENANT_ID \
              MICROSOFT_ENTRA_CLIENT_SECRET \
              DHW_TID \
              BW_TID \
              ALLOWED_ACCOUNT_EMAILS \
              ALLOWED_MICROSOFT_TENANT_IDS; do
              if [[ -z "${!var:-}" ]]; then
                echo "::error::Required runtime variable '${var}' is empty before applying Container App settings." >&2
                exit 1
              fi
            done

            echo "Applying runtime env vars to Container App ${CONTAINER_APP_NAME}"
            az containerapp update \
              --name "$CONTAINER_APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --set-env-vars \
                APP_ENV=production \
                DATABASE_URL="$DATABASE_URL" \
                MICROSOFT_ENTRA_CLIENT_ID="$MICROSOFT_ENTRA_CLIENT_ID" \
                MICROSOFT_ENTRA_TENANT_ID="$MICROSOFT_ENTRA_TENANT_ID" \
                MICROSOFT_ENTRA_CLIENT_SECRET="$MICROSOFT_ENTRA_CLIENT_SECRET" \
                MICROSOFT_ENTRA_REDIRECT_URI="$MICROSOFT_ENTRA_REDIRECT_URI" \
                WEB_APP_URL="$WEB_APP_URL" \
                API_BASE_URL="$API_BASE_URL" \
                ALLOWED_ORIGINS="$ALLOWED_ORIGINS" \
                ALLOWED_MICROSOFT_TENANT_IDS="$ALLOWED_MICROSOFT_TENANT_IDS" \
                ALLOWED_ACCOUNT_EMAILS="$ALLOWED_ACCOUNT_EMAILS" \
                KEY_VAULT_REFS_ENABLED=false \
                OUTLOOK_CATEGORY_LABELS_ENABLED=true \
              --output none

            echo "Container App update complete."
