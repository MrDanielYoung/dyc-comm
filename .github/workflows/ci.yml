name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  api-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install API dependencies
        run: |
          pip install -r apps/api/requirements.txt
          pip install -r apps/api/requirements-dev.txt

      - name: Compile API
        run: python -m compileall apps/api/app

      - name: Lint (ruff)
        run: |
          set +e
          ruff check apps tests > /tmp/ruff-lint.txt 2>&1
          rc=$?
          echo "## Ruff lint output (rc=$rc)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/ruff-lint.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/ruff-lint.txt
          exit $rc

      - name: Format check (ruff format)
        if: always()
        run: |
          set +e
          ruff format --check apps tests > /tmp/ruff-format-check.txt 2>&1
          rc=$?
          ruff format --diff apps tests > /tmp/ruff-format-diff.txt 2>&1 || true
          {
            echo "## Ruff format output (rc=$rc)"
            echo
            echo '### --check output'
            echo '```'
            cat /tmp/ruff-format-check.txt
            echo '```'
            echo
            echo '### --diff output'
            echo '```diff'
            cat /tmp/ruff-format-diff.txt
            echo '```'
          } >> $GITHUB_STEP_SUMMARY
          cat /tmp/ruff-format-check.txt
          echo "------ DIFF ------"
          cat /tmp/ruff-format-diff.txt
          exit $rc

      - name: Comment ruff diff on PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = "### CI debug: ruff format diff\n\n```diff\n";
            try {
              body += fs.readFileSync('/tmp/ruff-format-diff.txt', 'utf8').slice(0, 60000);
            } catch (e) { body += `(no diff file: ${e.message})`; }
            body += "\n```\n";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Run tests
        run: pytest

  docker-builds:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          file: ./apps/web/Dockerfile
          push: false
          tags: dyc-comm/web:ci

      - name: Build api image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile
          push: false
          tags: dyc-comm/api:ci
