name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  api-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install API dependencies
        run: |
          pip install -r apps/api/requirements.txt
          pip install -r apps/api/requirements-dev.txt

      - name: Compile API
        run: python -m compileall apps/api/app

      - name: Lint (ruff)
        run: ruff check apps tests

      - name: Format check (ruff format)
        id: format_check
        run: |
          set +e
          ruff format --check --diff apps tests > ruff-format.diff 2>&1
          rc=$?
          if [ $rc -ne 0 ]; then
            # Surface the diff in the workflow summary so we can read it
            # without needing to download artifacts or stream blob logs.
            echo "## ruff format diff" >> $GITHUB_STEP_SUMMARY
            echo '```diff' >> $GITHUB_STEP_SUMMARY
            head -800 ruff-format.diff >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            # Also surface a one-line summary as an error annotation so
            # the failed-files list is visible from the run page.
            grep -E '^Would reformat:' ruff-format.diff | while read -r line; do
              echo "::error::$line"
            done
          fi
          exit $rc

      - name: Upload ruff format diff
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-format-diff
          path: ruff-format.diff

      - name: Run tests
        run: pytest

  docker-builds:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          file: ./apps/web/Dockerfile
          push: false
          tags: dyc-comm/web:ci

      - name: Build api image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile
          push: false
          tags: dyc-comm/api:ci
