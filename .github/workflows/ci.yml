name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  api-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install API dependencies
        run: |
          pip install -r apps/api/requirements.txt
          pip install -r apps/api/requirements-dev.txt

      - name: Compile API
        run: python -m compileall apps/api/app

      - name: Lint (ruff)
        run: ruff check apps tests

      - name: Format check (ruff format)
        run: |
          set +e
          ruff format --check --diff apps tests > /tmp/fmt.diff 2>&1
          rc=$?
          if [ $rc -ne 0 ] && [ "${{ github.head_ref }}" = "extract/m365-auth-folder-slice" ]; then
            cp /tmp/fmt.diff /tmp/format.diff
            git config user.email "ci@github.com"
            git config user.name "ci-bot"
            mkdir -p .ci-debug
            cp /tmp/fmt.diff .ci-debug/format.diff
            git add .ci-debug/format.diff
            git commit -m "ci: capture format diff [skip ci]" || true
            git push origin HEAD:${{ github.head_ref }} || true
          fi
          exit $rc

      - name: Run tests
        run: pytest

  docker-builds:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          file: ./apps/web/Dockerfile
          push: false
          tags: dyc-comm/web:ci

      - name: Build api image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile
          push: false
          tags: dyc-comm/api:ci
