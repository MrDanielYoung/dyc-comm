name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  api-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install API dependencies
        run: |
          pip install -r apps/api/requirements.txt
          pip install -r apps/api/requirements-dev.txt

      - name: Compile API
        run: python -m compileall apps/api/app

      - name: Lint (ruff)
        run: ruff check apps tests

      - name: Format diff (debug — issue annotation)
        if: always()
        run: |
          ruff format --diff apps tests > /tmp/ruff-format.diff 2>&1 || true
          # Encode the diff into a single-line annotation we can read via
          # the GitHub annotations API (which goes through api.github.com,
          # not blob storage).
          if [ -s /tmp/ruff-format.diff ]; then
            python3 - <<'PY'
          import os
          with open('/tmp/ruff-format.diff', 'rb') as f:
              raw = f.read()
          # Truncate to keep the annotation short enough to read back.
          text = raw.decode('utf-8', 'replace')[:9000]
          # Squash newlines into a single line. Annotations don't allow %0A
          # escaping when using newer formatters, but ::error supports them.
          escaped = text.replace('%', '%25').replace('\r', '').replace('\n', '%0A')
          print(f"::error title=ruff format diff::{escaped}")
          PY
          fi

      - name: Format check (ruff format)
        run: ruff format --check apps tests

      - name: Run tests
        run: pytest

  docker-builds:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          file: ./apps/web/Dockerfile
          push: false
          tags: dyc-comm/web:ci

      - name: Build api image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile
          push: false
          tags: dyc-comm/api:ci
